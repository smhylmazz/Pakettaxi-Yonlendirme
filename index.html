                                                                <div className="p-3 bg-[#fffbeb] rounded-[12px] border border-[#fde68a] flex flex-col items-center justify-center shadow-sm">
                                                                    <p className="text-[10px] font-black text-[#b45309] uppercase tracking-widest mb-1">MOLA</p>
                                                                    <p className="text-[24px] font-black text-[#78350f] leading-none">{t.mla}</p>
                                                                </div>
                                                            </Fragment>
                                                        );
                                                    })()}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6">
                                            <div className="bg-white p-5 rounded-[24px] border border-slate-200 shadow-md">
                                                <h3 className="analytics-title font-black text-slate-900 !text-xl italic mb-4 border-l-8 border-emerald-500 pl-3 tracking-tighter uppercase">ZİRVE OPH (İLK 15)</h3>
                                                <div className="space-y-3">
                                                    {analytics.topOPH.map((s, i) => <AnalyticsStoreItem key={i} s={s} variant="green" index={i} onClick={(store) => setStoreDetailModalId(store.region_id)} />)}
                                                </div>
                                            </div>
                                            <div className="bg-white p-5 rounded-[24px] border border-slate-200 shadow-md">
                                                <h3 className="analytics-title font-black text-slate-900 !text-xl italic mb-4 border-l-8 border-red-500 pl-3 tracking-tighter uppercase">DÜŞÜK OPH (SON 15)</h3>
                                                <div className="space-y-3">
                                                    {analytics.bottomOPH.map((s, i) => <AnalyticsStoreItem key={i} s={s} variant="red" index={i} onClick={(store) => setStoreDetailModalId(store.region_id)} />)}
                                                </div>
                                            </div>
                                            <div className="bg-white p-5 rounded-[24px] border border-slate-200 shadow-md">
                                                <h3 className="analytics-title font-black text-slate-900 !text-xl italic mb-4 border-l-8 border-blue-500 pl-3 tracking-tighter uppercase">EN HIZLI MAĞAZALAR (LT)</h3>
                                                <div className="space-y-3">
                                                    {analytics.topLT.map((s, i) => <AnalyticsStoreItem key={i} s={s} variant="blue" index={i} onClick={(store) => setStoreDetailModalId(store.region_id)} />)}
                                                </div>
                                            </div>
                                        </div>
                                    </Fragment>
                                )}
                                {search && (
                                    <div className="space-y-3">
                                        <ColumnHeader />
                                        <div className="grid grid-cols-1 gap-2">
                                            {searchList.map((s) => <GridCardComp key={s.region_id} s={s} stats={s.stats} trend={s.trend} neighbors={getNeighborsForStore(s, false)} isNeighborCard={false} onUpdateTrend={updateTrendGlobally} onCopySupport={handleCopySupport} onShowNeighbors={handleShowNeighborsModal} channelFilter={channelFilter} />)}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* DESTEK VE YÖNLENDİRME */}
                        <div style={{ display: view === 'support' ? 'block' : 'none' }}>
                            <div className="space-y-4 animate-in w-full px-2 lg:px-4 mx-auto max-w-[1920px]">
                                <div className="bg-[#0f2e21] border-emerald-600 shadow-md rounded-[16px] px-4 py-3 flex flex-col xl:flex-row justify-between items-center gap-3">
                                    <h2 className="text-xl font-black italic uppercase text-white tracking-tighter text-left whitespace-nowrap">DESTEK VE YÖNLENDİRME MERKEZİ</h2>
                                    <div className="flex flex-nowrap items-center justify-start xl:justify-end gap-2 w-full overflow-x-auto pb-1 custom-scrollbar hide-scroll">
                                        <div className="flex items-center gap-1.5 bg-[#064e3b] p-1.5 rounded-lg border border-emerald-700 shrink-0">
                                            <span className="text-[9px] font-black text-emerald-200 uppercase tracking-widest pl-1">BÖLGE MÜDÜRÜ:</span>
                                            <select className="bg-emerald-800 text-white border border-emerald-600 font-black rounded-md px-2 py-1 outline-none text-xs cursor-pointer shadow-sm" value={selectedZoneManager} onChange={(e) => setSelectedZoneManager(e.target.value)}>
                                                <option value="all">TÜM BÖLGE MÜDÜRLERİ</option>
                                                {zoneManagers.map(zm => <option key={zm} value={zm}>{zm}</option>)}
                                            </select>
                                        </div>
                                        <div className="flex items-center gap-1.5 bg-[#064e3b] p-1.5 rounded-lg border border-emerald-700 shrink-0">
                                            <span className="text-[9px] font-black text-emerald-200 uppercase tracking-widest pl-1">ATAMA &gt;</span>
                                            <input type="number" value={supportAtamaThreshold} onChange={(e) => setSupportAtamaThreshold(Number(e.target.value) || 0)} className="w-10 h-6 text-center rounded bg-white text-emerald-900 font-black outline-none text-xs" />
                                        </div>
                                        <div className="flex items-center gap-1.5 bg-[#064e3b] p-1.5 rounded-lg border border-emerald-700 shrink-0">
                                            <span className="text-[9px] font-black text-emerald-200 uppercase tracking-widest pl-1">TOPLAMA &lt;</span>
                                            <input type="number" value={supportToplamaThreshold} onChange={(e) => setSupportToplamaThreshold(Number(e.target.value) || 0)} className="w-10 h-6 text-center rounded bg-white text-emerald-900 font-black outline-none text-xs" />
                                        </div>
                                        <div className="flex items-center gap-1.5 bg-[#064e3b] p-1.5 rounded-lg border border-emerald-700 pr-1.5 shrink-0">
                                            <span className="text-[9px] font-black text-emerald-200 uppercase tracking-widest pl-1">OPH &gt;=</span>
                                            <input type="number" step="0.1" value={supportOphThreshold} onChange={(e) => setSupportOphThreshold(Number(e.target.value) || 0)} className="w-12 h-6 text-center rounded bg-white text-emerald-900 font-black outline-none text-xs" />
                                        </div>
                                    </div>
                                </div>

                                <div className="w-full">
                                    <div className="bg-white p-5 rounded-[20px] border border-slate-200 shadow-md">
                                        <h3 className="text-xl font-black text-slate-800 uppercase italic mb-1 border-l-8 border-red-500 pl-3">DESTEK BEKLEYEN MAĞAZALAR</h3>
                                        <p className="text-[9px] font-black text-slate-400 mb-4 uppercase tracking-widest pl-5">{channelFilter.toUpperCase()} Atama &gt; {supportAtamaThreshold} DK | Toplama &lt; {supportToplamaThreshold} DK | OPH &gt;= {supportOphThreshold}</p>
                                        
                                        <div className="grid grid-cols-1 gap-3 max-h-[850px] overflow-y-auto pr-2">
                                            {filteredNeedyStores.map((s) => <HorizontalCardComp key={s.region_id} s={s} stats={s.stats} trend={s.trend} neighbors={getNeighborsForStore(s, false)} type="needy" onUpdateTrend={updateTrendGlobally} onCopySupport={handleCopySupport} onShowNeighbors={handleShowNeighborsModal} channelFilter={channelFilter} />)}
                                            {filteredNeedyStores.length === 0 && <div className="bg-white p-10 rounded-[16px] border-2 border-dashed border-slate-200 text-center shadow-sm col-span-full"><p className="text-lg font-black text-slate-400 uppercase italic">Kriterlere uygun mağaza bulunamadı.</p></div>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* KRİTİK */}
                        <div style={{ display: view === 'critical' ? 'block' : 'none' }}>
                            <div className="space-y-4 animate-in w-full px-2 lg:px-4 mx-auto max-w-[1920px]">
                                <ColumnHeader />
                                <div className="grid grid-cols-1 gap-2">
                                    {criticalStoresList.map((s) => <GridCardComp key={s.region_id} s={s} stats={s.stats} trend={s.trend} neighbors={getNeighborsForStore(s, true)} isNeighborCard={false} onUpdateTrend={updateTrendGlobally} onCopySupport={handleCopySupport} onShowNeighbors={handleShowNeighborsModal} channelFilter={channelFilter} />)}
                                </div>
                            </div>
                        </div>

                        {/* TOP15 */}
                        <div style={{ display: view === 'top15' ? 'block' : 'none' }}>
                            <div className="space-y-4 animate-in w-full px-2 lg:px-4 mx-auto max-w-[1920px]">
                                <div className="bg-white p-4 rounded-[16px] border border-slate-200 shadow-sm flex flex-col lg:flex-row items-center justify-between gap-3 mb-4 ring-1 ring-slate-50">
                                    <div className="flex flex-col gap-0.5 w-full lg:w-auto shrink-0">
                                        <h3 className="text-lg font-black text-slate-800 uppercase italic">ANALİZ KRİTERİ</h3>
                                        <p className="text-[9px] font-black text-slate-500 uppercase tracking-widest">FİLTRELENEN DEĞERLERE GÖRE {channelFilter !== 'all' ? 'SİPARİŞ' : 'LEAD TIME'} SIRALAMASI</p>
                                    </div>
                                    <div className="flex flex-nowrap items-center justify-start lg:justify-end gap-2 w-full overflow-x-auto pb-1 custom-scrollbar hide-scroll">
                                        <div className="flex items-center gap-1.5 bg-slate-50 p-1.5 rounded-lg border border-slate-200 shrink-0">
                                            <span className="text-[9px] font-black text-slate-500 uppercase tracking-widest pl-1">BÖLGE MÜDÜRÜ:</span>
                                            <select className="bg-white text-slate-800 border border-slate-200 font-black rounded-md px-2 h-[26px] outline-none text-[11px] cursor-pointer shadow-sm" value={top15ZoneManager} onChange={(e) => setTop15ZoneManager(e.target.value)}>
                                                <option value="all">TÜM BÖLGE MÜDÜRLERİ</option>
                                                {zoneManagers.map(zm => <option key={zm} value={zm}>{zm}</option>)}
                                            </select>
                                        </div>
                                        <div className="flex items-center gap-1.5 bg-slate-50 p-1.5 rounded-lg border border-slate-200 shrink-0">
                                            <span className="text-[9px] font-black text-slate-500 uppercase tracking-widest pl-1">TOPLAMA &lt;</span>
                                            <div className="flex gap-1">
                                                {[5, 10, 15, 20].map(val => (
                                                    <button key={val} onClick={() => setTop15Threshold(val)} className={`w-8 h-[26px] rounded-md font-black text-[11px] transition-all ${top15Threshold === val ? 'bg-orange-600 text-white shadow-sm' : 'bg-white border border-slate-200 text-slate-400 hover:bg-slate-200'}`}>
                                                        {val}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-1.5 bg-slate-50 p-1.5 rounded-lg border border-slate-200 pr-1.5 shrink-0">
                                            <span className="text-[9px] font-black text-slate-500 uppercase tracking-widest pl-1">OPH &gt;=</span>
                                            <input type="number" step="0.1" value={top15OphThreshold} onChange={(e) => setTop15OphThreshold(Number(e.target.value) || 0)} className="w-12 h-[26px] text-center rounded bg-white border border-slate-200 text-slate-800 font-black outline-none text-[12px] shadow-inner" />
                                        </div>
                                    </div>
                                </div>
                                <ColumnHeader />
                                <div className="grid grid-cols-1 gap-2">
                                    {top15List.map((s) => <GridCardComp key={s.region_id} s={s} stats={s.stats} trend={s.trend} neighbors={getNeighborsForStore(s, false)} isNeighborCard={false} onUpdateTrend={updateTrendGlobally} onCopySupport={handleCopySupport} onShowNeighbors={handleShowNeighborsModal} channelFilter={channelFilter} />)}
                                    {top15List.length === 0 && (
                                        <div className="bg-white p-12 rounded-[24px] border-4 border-dashed border-slate-200 text-center shadow-sm col-span-1">
                                            <p className="text-xl font-black text-slate-300 uppercase italic">Kriterlere uygun mağaza bulunamadı.</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* MODALS */}
                        {showOfflineModal && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 modal-overlay animate-in" onClick={() => setShowOfflineModal(false)}>
                                <div className="bg-white w-full max-w-5xl rounded-[24px] max-h-[85vh] overflow-hidden flex flex-col shadow-2xl border-[4px] border-red-500/10 ring-1 ring-red-200" onClick={e => e.stopPropagation()}>
                                    <div className="p-5 border-b border-red-50 flex justify-between items-center bg-red-50/30">
                                        <h2 className="text-2xl font-black italic uppercase text-red-900 tracking-tighter">KRİTİK OFFLINE ANALİZİ</h2>
                                        <div className="flex gap-2">
                                            <button onClick={copyExcelOfflineList} className="bg-slate-900 text-white px-5 py-2 rounded-lg font-black text-[10px] uppercase shadow-md hover:bg-slate-800 transition-all">LİSTEYİ KOPYALA</button>
                                            <button onClick={() => setShowOfflineModal(false)} className="bg-white border border-red-200 text-red-500 hover:text-red-800 px-3 py-1 rounded-lg transition-all shadow-sm font-black text-lg">✕</button>
                                        </div>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-5 space-y-4">
                                        <div className="grid grid-cols-1 gap-4">
                                            {courierStats.filter(g => (g.offline + g.kayip) > 0).sort((a,b) => (b.offline + b.kayip) - (a.offline + a.kayip)).map((g, i) => (
                                                <div key={i} className="bg-white p-4 rounded-[16px] border border-slate-100 flex flex-col gap-4 shadow-sm hover:border-red-300 transition-all">
                                                    <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                                                        <div className="min-w-0 flex-1">
                                                            <div className="flex items-center gap-3 mb-2">
                                                                <p className="text-xl font-black text-slate-900 uppercase truncate leading-tight cursor-pointer hover:text-blue-600 transition-colors flex items-center gap-2" onClick={() => setExpandedOfflineStore(expandedOfflineStore === g.storeName ? null : g.storeName)}>
                                                                    {g.storeName}
                                                                    <span className="text-[9px] font-black bg-slate-100 text-slate-500 px-2 py-1 rounded border border-slate-200">{expandedOfflineStore === g.storeName ? 'GİZLE ▲' : 'GENEL ÖZET ▼'}</span>
                                                                </p>
                                                            </div>
                                                            <div className="flex flex-wrap items-center gap-2">
                                                                <div className="bg-blue-50 text-blue-700 border border-blue-200 rounded px-2 py-0.5 font-black text-[11px] italic">OPH {g.perf?.oph?.toFixed(2) || '0.00'}</div>
                                                                {g.perf && (
                                                                    <div className="flex gap-1.5">
                                                                        <div className="bg-orange-50 border border-orange-200 px-2 py-0.5 rounded flex items-center gap-1">
                                                                            <span className="text-[9px] font-black text-orange-600 uppercase">TOP</span>
                                                                            <span className="text-[12px] font-black text-orange-800">{(g.perf.hemenToplama || 0).toFixed(1)}</span>
                                                                        </div>
                                                                        <div className="bg-blue-50 border border-blue-200 px-2 py-0.5 rounded flex items-center gap-1">
                                                                            <span className="text-[9px] font-black text-blue-600 uppercase">ATM</span>
                                                                            <span className="text-[12px] font-black text-blue-800">{(g.perf.hemenAtama || 0).toFixed(1)}</span>
                                                                        </div>
                                                                        <div className="bg-red-50 border border-red-200 px-2 py-0.5 rounded flex items-center gap-1">
                                                                            <span className="text-[9px] font-black text-red-600 uppercase">LT</span>
                                                                            <span className="text-[12px] font-black text-red-800">{(g.perf.hemenLT || 0).toFixed(1)}</span>
                                                                        </div>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>
                                                        <div className="bg-red-600 text-white font-black text-4xl px-6 py-3 rounded-[16px] shadow-md leading-none">{g.offline + g.kayip}</div>
                                                    </div>
                                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-2 border-t border-slate-50 pt-3">
                                                        {g.couriers.filter(c => (c.status || "").toLowerCase().includes('off') || (c.status || "").toLowerCase().includes('kay')).map((c, ci) => (
                                                            <div key={ci} className="bg-red-50 border border-red-100 px-3 py-1.5 rounded-lg flex items-center justify-between gap-2">
                                                                <span className="text-[11px] font-black text-red-900 uppercase italic truncate">{c.courierName}</span>
                                                                <span className="text-[8px] bg-red-600 text-white px-1.5 py-0.5 rounded uppercase font-black">{c.status}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                    {expandedOfflineStore === g.storeName && g.perf && (
                                                        <div className="col-span-full mt-3 pt-3 border-t-2 border-slate-100">
                                                            <GridCardComp s={g.perf} stats={g.perf.stats} trend={g.perf.trend} neighbors={getNeighborsForStore(g.perf, false)} isNeighborCard={false} isManual={false} onUpdateTrend={updateTrendGlobally} onCopySupport={handleCopySupport} onShowNeighbors={handleShowNeighborsModal} channelFilter={channelFilter} />
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeNeighborModalStore && activeNeighborModalList && (
                            <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 modal-overlay animate-in" onClick={() => setNeighborModalConfig(null)}>
                                <div className="bg-slate-50 w-full max-w-4xl rounded-[24px] max-h-[90vh] overflow-hidden flex flex-col shadow-2xl border-[4px] border-emerald-500/10 ring-1 ring-emerald-200" onClick={e => e.stopPropagation()}>
                                    <div className="p-4 border-b border-emerald-100 flex justify-between items-center bg-white shadow-sm z-10">
                                        <div className="flex flex-col gap-0.5">
                                            <div className="flex items-center gap-2">
                                                <span className="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded font-black text-[10px] uppercase tracking-widest">ÇEVRE ANALİZİ</span>
                                                <h2 className="text-[16px] font-black italic uppercase text-slate-800 tracking-tighter">
                                                    {activeNeighborModalStore.clean}
                                                </h2>
                                            </div>
                                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{activeNeighborModalList.length} UYGUN MAĞAZA BULUNDU</p>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <button onClick={() => {
                                                const queue = activeNeighborModalList.map(n => n.clean).filter(Boolean);
                                                if(queue.length > 0) {
                                                    setBotStatus({ active: true, remaining: queue.length, percent: 0, text: "Öncelikli Tarama Başlıyor..." });
                                                    try { document.dispatchEvent(new CustomEvent('START_BOT', { detail: queue })); } catch(e) {}
                                                    setNeighborModalConfig(null);
                                                }
                                            }} className="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-lg font-black text-[11px] uppercase shadow-md transition-all flex items-center gap-1.5 border-2 border-orange-400">
                                                ⚡ SADECE BU MAĞAZALARI TARA
                                            </button>
                                            <button onClick={() => setNeighborModalConfig(null)} className="bg-slate-100 border border-slate-200 text-slate-500 hover:text-red-600 hover:bg-red-50 hover:border-red-200 px-3 py-1 rounded-lg transition-all shadow-sm font-black text-lg">✕</button>
                                        </div>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-4 space-y-3">
                                        {activeNeighborModalList.length === 0 ? (
                                            <div className="text-center text-sm font-black text-slate-400 uppercase py-10 bg-white rounded-xl border-2 border-dashed border-slate-200 shadow-sm">
                                                UYGUN MAĞAZA BULUNAMADI
                                            </div>
                                        ) : (
                                            activeNeighborModalList.map(n => <ModalNeighborCard key={n.region_id} n={n} isBad={Math.abs((n.trendLt || 0) - (n.trendTop || 0)) > 18 || (n.stats?.online < 5)} onUpdateTrend={updateTrendGlobally} />)
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {storeDetailModalId && activeDetailStore && (
                            <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 modal-overlay animate-in" onClick={() => setStoreDetailModalId(null)}>
                                <div className="bg-slate-50 w-full max-w-6xl rounded-[24px] max-h-[90vh] overflow-hidden flex flex-col shadow-2xl border-[4px] border-blue-500/10 ring-1 ring-blue-200" onClick={e => e.stopPropagation()}>
                                    <div className="p-4 border-b border-blue-100 flex justify-between items-center bg-white shadow-sm z-10">
                                        <div className="flex flex-col gap-0.5">
                                            <div className="flex items-center gap-2">
                                                <span className="bg-blue-100 text-blue-700 px-2 py-0.5 rounded font-black text-[10px] uppercase tracking-widest">MAĞAZA DETAYI</span>
                                                <h2 className="text-xl font-black italic uppercase text-slate-800 tracking-tighter">
                                                    {activeDetailStore.clean}
                                                </h2>
                                            </div>
                                        </div>
                                        <button onClick={() => setStoreDetailModalId(null)} className="bg-slate-100 border border-slate-200 text-slate-500 hover:text-red-600 hover:bg-red-50 hover:border-red-200 px-3 py-1 rounded-lg transition-all shadow-sm font-black text-lg">✕</button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-4 space-y-3">
                                        <ColumnHeader />
                                        <GridCardComp s={activeDetailStore} stats={activeDetailStore.stats} trend={activeDetailStore.trend} neighbors={getNeighborsForStore(activeDetailStore, false)} isNeighborCard={false} isManual={false} onUpdateTrend={updateTrendGlobally} onCopySupport={handleCopySupport} onShowNeighbors={handleShowNeighborsModal} channelFilter={channelFilter} />
                                    </div>
                                </div>
                            </div>
                        )}
                    </Fragment>
                );
            };

            return (
                <div className="min-h-screen pb-16 relative">
                    <datalist id="all-stores-list">
                        {storesWithMetrics.map(s => (
                            <option key={s.region_id} value={s.clean}>[{normalizeCode(s.region_id)}] {s.city}</option>
                        ))}
                    </datalist>

                    <header className="bg-white/95 backdrop-blur-xl border-b border-slate-200 px-4 py-3 flex flex-col md:flex-row justify-between items-center sticky top-0 z-50 shadow-sm gap-3">
                        <div className="flex items-center gap-3 w-full md:w-auto flex-1">
                            <div className="bg-orange-600 p-1.5 rounded text-white shadow-sm rotate-2 transform hover:rotate-0 transition-all duration-300">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4"><path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M15 22v-4a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4"/></svg>
                            </div>
                            <h1 className="font-black text-xl tracking-tighter italic uppercase text-slate-900">PAKETTAXI <span className="text-orange-600 not-italic">YÖNLENDİRME</span></h1>
                        </div>
                        
                        <div className="flex flex-col items-center gap-2">
                            <nav className="flex flex-wrap justify-center bg-slate-100 p-1 rounded-lg gap-1 border border-slate-200">
                                {['upload', 'dashboard', 'support', 'top15', 'critical'].map(v => (
                                    <button key={v} onClick={() => { setView(v); setSearch(''); }} className={`px-3 py-1.5 rounded text-[10px] font-black uppercase tracking-wider transition-all duration-300 ${view === v ? 'bg-white shadow-sm text-orange-600' : 'text-slate-500 hover:text-slate-900 hover:bg-slate-200'}`}>
                                        {v === 'upload' ? 'YÜKLE' : v === 'dashboard' ? 'DASHBOARD' : v === 'support' ? 'DESTEK & YÖNLENDİRME' : v === 'top15' ? 'TOP 15' : 'KRİTİK'}
                                    </button>
                                ))}
                            </nav>
                        </div>
                        
                        <div className="flex items-center justify-end w-full md:w-auto flex-1 gap-2 flex-wrap">
                            {view !== 'upload' && (
                                <div className="flex items-center gap-1.5 bg-slate-50 px-2 py-1 rounded-md border border-slate-200 shadow-sm shrink-0">
                                    <span className="text-[9px] font-black text-slate-500 uppercase tracking-widest hidden lg:inline">DİKEY:</span>
                                    <select className="bg-white text-slate-800 border border-slate-200 font-black rounded px-1.5 py-0.5 outline-none text-[10px] cursor-pointer shadow-sm uppercase" value={channelFilter} onChange={(e) => setChannelFilter(e.target.value)}>
                                        <option value="all">TÜMÜ</option>
                                        <option value="hemen">HEMEN</option>
                                        <option value="yemek">YEMEK</option>
                                        <option value="dk45">45 DK</option>
                                    </select>
                                </div>
                            )}
                            
                            <div className="flex items-center gap-1.5 bg-slate-100 p-1 rounded-md border border-slate-200 shadow-sm shrink-0">
                                <span className="text-[9px] font-black text-slate-500 uppercase ml-1 hidden lg:inline">MOD:</span>
                                <select 
                                    className="bg-white border-none font-black text-slate-800 text-[10px] outline-none cursor-pointer py-1 px-1.5 rounded uppercase shadow-sm"
                                    value={botScanMode}
                                    onChange={(e) => setBotScanMode(e.target.value)}
                                >
                                    <option value="all">🎯 TÜMÜNÜ TARA</option>
                                    <option value="main">🏢 SADECE LİSTE</option>
                                    <option value="neighbors">🏘️ SADECE KOMŞULAR</option>
                                </select>
                            </div>

                            {botStatus.active && (
                                <div className="flex items-center gap-2 bg-slate-100 px-2 py-1 rounded-md border border-slate-200 shadow-sm animate-in shrink-0">
                                    <div className="w-3 h-3 border-2 border-orange-500 border-t-transparent rounded-full animate-spin"></div>
                                    <span className="text-[10px] font-black text-slate-800">%{botStatus.percent}</span>
                                </div>
                            )}
                            <button onClick={toggleAutoBot} className={`px-3 py-1.5 rounded-md text-[9px] font-black uppercase tracking-wider shadow-sm transition-all flex items-center justify-center gap-1 max-w-[150px] shrink-0 ${botStatus.active ? 'bg-red-100 text-red-800 border border-red-300 hover:bg-red-200' : 'bg-slate-900 text-white hover:bg-slate-800'}`}>
                                {botStatus.active ? '🛑 DURDUR' : '🤖 BOTU BAŞLAT'}
                            </button>
                        </div>
                    </header>

                    <main className="centering-container mt-4">
                        {renderView()}
                    </main>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
